<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Schedule</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .timeline { position: relative; }
        .timeline div { position: absolute; width: 100%; }
        .clock { font-size: 24px; margin-bottom: 20px; }
        .progress-bar { width: 100%; height: 30px; background: #e0e0e0; }
        .progress { height: 100%; width: 0; background: #3b82f6; }
    </style>
</head>
<body>
    <div class="clock" id="clock"></div>
    <div class="timeline">
        <div style="top: 0%">9:00 AM - 10:00 AM: Meeting</div>
        <div style="top: 20%">10:00 AM - 12:00 PM: Work</div>
        <div style="top: 40%">12:00 PM - 1:00 PM: Lunch</div>
        <div style="top: 60%">1:00 PM - 3:00 PM: Project Development</div>
        <div style="top: 80%">3:00 PM - 5:00 PM: Review</div>
    </div>
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toUTCString();

            const progressBar = document.getElementById('progress');
            const total = 8 * 60 * 60 * 1000; // 8 hours in milliseconds
            const elapsed = now - new Date(now.getFullYear(), now.getMonth(), now.getDate(), 9); // Starting at 9 AM
            const percentage = Math.min(100, (elapsed / total) * 100);
            progressBar.style.width = percentage + '%';
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
