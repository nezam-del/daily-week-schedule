<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .clock {
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            background-color: #1E1E1E;
            display: inline-block;
        }
        h1 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Digital Clock</h1>
    <div id="clocks">
        <div class="clock">
            <h2>Eastern Standard Time (EST)</h2>
            <div id="est" class="time"></div>
        </div>
        <div class="clock">
            <h2>Central Standard Time (CST)</h2>
            <div id="cst" class="time"></div>
        </div>
        <div class="clock">
            <h2>Mountain Standard Time (MST)</h2>
            <div id="mst" class="time"></div>
        </div>
        <div class="clock">
            <h2>Pacific Standard Time (PST)</h2>
            <div id="pst" class="time"></div>
        </div>
        <div class="clock">
            <h2>Coordinated Universal Time (UTC)</h2>
            <div id="utc" class="time"></div>
        </div>
        <div class="clock">
            <h2>Greenwich Mean Time (GMT)</h2>
            <div id="gmt" class="time"></div>
        </div>
    </div>
    <script>
        function updateClocks() {
            const options = { hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false };
            const utcDate = new Date();
            document.getElementById('est').innerText = utcDate.toLocaleString('en-US', { timeZone: 'America/New_York', ...options });
            document.getElementById('cst').innerText = utcDate.toLocaleString('en-US', { timeZone: 'America/Chicago', ...options });
            document.getElementById('mst').innerText = utcDate.toLocaleString('en-US', { timeZone: 'America/Denver', ...options });
            document.getElementById('pst').innerText = utcDate.toLocaleString('en-US', { timeZone: 'America/Los_Angeles', ...options });
            document.getElementById('utc').innerText = utcDate.toUTCString().split(' ')[4];
            document.getElementById('gmt').innerText = utcDate.toGMTString().split(' ')[4];
        }
        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
